<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVault</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .movie-card img {
      transition: transform 0.3s ease;
    }

    .movie-card:hover img {
      transform: scale(1.05);
    }

    .genre-row {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="p-4 flex justify-between items-center border-b border-zinc-800 gap-4 flex-wrap">
    <h1 class="text-xl font-bold tracking-wide">CINEVAULT</h1>
    <input
      id="search"
      placeholder="Search movies..."
      class="bg-zinc-900 px-3 py-2 rounded outline-none w-full max-w-sm"
    />
  </nav>

  <!-- MAIN -->
  <div id="app" class="p-6 space-y-10"></div>

  <!-- POPUP -->
  <div id="popup" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50">
    <div class="bg-zinc-900 p-6 rounded-xl max-w-4xl w-full relative max-h-[90vh] overflow-y-auto">
      <button onclick="closePopup()" class="absolute top-3 right-3 text-xl">✕</button>

      <div class="flex flex-col md:flex-row gap-6">
        <img id="p-img" class="w-52 h-80 object-cover rounded mx-auto md:mx-0" />

        <div>
          <h2 id="p-title" class="text-2xl font-bold mb-2"></h2>
          <p id="p-meta" class="text-zinc-400 text-sm mb-3"></p>
          <p id="p-cast" class="text-sm mb-3"></p>
          <p id="p-desc" class="text-sm mb-4 leading-6"></p>

          <div class="flex gap-3 flex-wrap">
            <button class="bg-white text-black px-4 py-2 rounded">Watch</button>
            <button class="bg-zinc-700 px-4 py-2 rounded">Download</button>
            <button class="bg-zinc-700 px-4 py-2 rounded">Share</button>
          </div>
        </div>
      </div>
    </div>
  </div>

    let currentMovies = [...movies];

    function card(m) {
      const safeMovie = JSON.stringify(m).replace(/'/g, "&apos;");
      return `
        <div class="movie-card min-w-[150px] cursor-pointer" onclick='openPopup(${safeMovie})'>
          <img
            src="${m.poster}"
            alt="${m.title}"
            class="w-[150px] h-[220px] object-cover rounded bg-zinc-800"
            onerror="this.onerror=null;this.src='${posterFallback(m.title)}';"
          >
          <p class="text-xs mt-2 w-[150px] leading-4">${m.title}</p>
        </div>
      `;
    }

    function render(list = currentMovies) {
      const genres = [...new Set(list.flatMap(m => m.genres))].sort();

      document.getElementById("app").innerHTML = genres.map(g => `
        <div>
          <h2 class="mb-3 capitalize text-lg font-semibold">${g}</h2>
          <div class="genre-row flex gap-4 overflow-x-auto scrollbar-hide pb-2">
            ${list.filter(m => m.genres.includes(g)).map(card).join("")}
          </div>
        </div>
      `).join("");
    }

    function openPopup(m) {
      document.getElementById("p-img").src = m.poster;
      document.getElementById("p-img").onerror = function () {
        this.src = posterFallback(m.title);
      };

      document.getElementById("p-title").innerText = m.title;
      document.getElementById("p-meta").innerText =
        `${m.year} • ${m.genres.join(", ")} • ⭐ ${m.rating}`;
      document.getElementById("p-cast").innerText =
        "Cast: " + m.cast.join(", ");
      document.getElementById("p-desc").innerText = m.desc;

      document.getElementById("popup").classList.remove("hidden");
      document.getElementById("popup").classList.add("flex");
    }

    function closePopup() {
      document.getElementById("popup").classList.add("hidden");
      document.getElementById("popup").classList.remove("flex");
    }

    document.getElementById("search").addEventListener("input", e => {
      const val = e.target.value.toLowerCase().trim();

      if (!val) {
        currentMovies = [...movies];
        render(currentMovies);
        return;
      }

      currentMovies = movies.filter(m =>
        m.title.toLowerCase().includes(val) ||
        m.genres.some(g => g.toLowerCase().includes(val)) ||
        m.cast.some(c => c.toLowerCase().includes(val))
      );

      document.getElementById("app").innerHTML = `
        <div>
          <h2 class="text-lg font-semibold mb-3">Results</h2>
          <div class="flex gap-4 overflow-x-auto scrollbar-hide pb-2">
            ${
              currentMovies.length
                ? currentMovies.map(card).join("")
                : `<p class="text-zinc-400">No movies found.</p>`
            }
          </div>
        </div>
      `;
    });

    render();
  </script>
</body>
</html>
